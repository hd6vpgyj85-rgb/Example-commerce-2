<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colección - Yukly Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-black: #0a0a0a;
      --color-white: #ffffff;
      --color-yellow: #FFE600;
      --color-gray: #1a1a1a;
      --color-gray-light: #a0a0a0;
      --color-success: #25d366;
      --color-error: #ff4444;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
      --spacing-2xl: 48px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--color-black);
      color: var(--color-white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Navbar */
    nav {
      position: sticky;
      top: 0;
      background: var(--color-black);
      border-bottom: 1px solid var(--color-gray);
      z-index: 100;
      padding: var(--spacing-md);
    }

    .navbar-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-xl);
    }

    .navbar-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 20px;
      cursor: pointer;
      white-space: nowrap;
    }

    .navbar-right {
      display: flex;
      gap: var(--spacing-lg);
      align-items: center;
    }

    .cart-icon {
      cursor: pointer;
      position: relative;
      font-size: 20px;
    }

    .cart-badge {
      position: absolute;
      top: -8px;
      right: -12px;
      background: var(--color-yellow);
      color: var(--color-black);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 4px;
      background: none;
      border: none;
      padding: 0;
      transition: all 0.3s;
    }

    .hamburger span {
      width: 24px;
      height: 2px;
      background: var(--color-white);
      transition: all 0.3s;
    }

    .hamburger.active span:nth-child(1) {
      transform: rotate(45deg) translateY(10px);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active span:nth-child(3) {
      transform: rotate(-45deg) translateY(-10px);
    }

    @media (max-width: 768px) {
      .hamburger {
        display: flex;
      }

      .navbar-container {
        gap: var(--spacing-md);
      }

      .navbar-right {
        gap: var(--spacing-md);
      }
    }

    .mobile-menu {
      position: fixed;
      left: 0;
      top: 60px;
      width: 100%;
      background: var(--color-black);
      z-index: 150;
      border-top: 3px solid var(--color-yellow);
      box-shadow: 0 2px 20px rgba(255, 230, 0, 0.1);
    }

    .mobile-menu-header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg);
      cursor: pointer;
      transition: all 0.3s;
      min-height: 60px;
    }

    .mobile-menu-header:active {
      background: rgba(255, 230, 0, 0.05);
    }

    .mobile-menu-arrow {
      color: var(--color-yellow);
      transition: transform 0.3s;
    }

    .mobile-menu.active .mobile-menu-arrow {
      transform: rotate(180deg);
    }

    .mobile-menu-content {
      max-height: 0;
      overflow: hidden;
      padding: 0 var(--spacing-lg);
      transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .mobile-menu.active .mobile-menu-content {
      max-height: 500px;
      padding: var(--spacing-lg);
    }

    .mobile-menu-content ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .mobile-menu-content li {
      animation: slideInLeft 0.3s ease forwards;
    }

    .mobile-menu-content li:nth-child(1) { animation-delay: 0.05s; }
    .mobile-menu-content li:nth-child(2) { animation-delay: 0.1s; }
    .mobile-menu-content li:nth-child(3) { animation-delay: 0.15s; }
    .mobile-menu-content li:nth-child(4) { animation-delay: 0.2s; }
    .mobile-menu-content li:nth-child(5) { animation-delay: 0.25s; }
    .mobile-menu-content li:nth-child(6) { animation-delay: 0.3s; }
    .mobile-menu-content li:nth-child(7) { animation-delay: 0.35s; }
    .mobile-menu-content li:nth-child(8) { animation-delay: 0.4s; }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .mobile-menu-content a {
      color: var(--color-white);
      text-decoration: none;
      cursor: pointer;
      display: block;
      padding: var(--spacing-md) 0;
      font-size: 16px;
      transition: all 0.3s;
      border-left: 3px solid transparent;
      padding-left: var(--spacing-md);
    }

    .mobile-menu-content a:hover {
      color: var(--color-yellow);
      border-left-color: var(--color-yellow);
    }

    .mobile-menu-content a.active {
      color: var(--color-yellow);
      border-left-color: var(--color-yellow);
      font-weight: 600;
    }

    /* Breadcrumb */
    .breadcrumb {
      max-width: 1400px;
      margin: 0 auto;
      padding: var(--spacing-md) var(--spacing-lg);
      font-size: 14px;
      color: var(--color-gray-light);
    }

    .breadcrumb a {
      color: var(--color-white);
      text-decoration: none;
      cursor: pointer;
    }

    .breadcrumb a:hover {
      color: var(--color-yellow);
    }

    /* Hero */
    .collection-hero {
      height: 400px;
      background: var(--color-gray);
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .collection-hero img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .collection-hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
    }

    .collection-hero-content {
      position: relative;
      z-index: 10;
      padding: var(--spacing-2xl);
    }

    .collection-hero-content h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 48px;
      font-weight: 700;
      margin-bottom: var(--spacing-md);
    }

    .collection-hero-content p {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.8);
    }

    @media (max-width: 768px) {
      .collection-hero {
        height: 250px;
      }

      .collection-hero-content h1 {
        font-size: 28px;
      }

      .collection-hero-content p {
        font-size: 14px;
      }
    }

    /* Section */
    .section {
      max-width: 1400px;
      margin: 0 auto;
      padding: var(--spacing-2xl) var(--spacing-lg);
    }

    .section h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: var(--spacing-xl);
    }

    /* Product Grid */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: var(--spacing-lg);
    }

    .product-card {
      background: var(--color-gray);
      cursor: pointer;
      transition: transform 0.3s;
      position: relative;
    }

    .product-card:hover {
      transform: translateY(-4px);
    }

    .product-image {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .product-badge {
      position: absolute;
      top: var(--spacing-md);
      right: var(--spacing-md);
      background: var(--color-yellow);
      color: var(--color-black);
      padding: var(--spacing-xs) var(--spacing-sm);
      font-size: 12px;
      font-weight: 700;
    }

    .product-badge.sold-out {
      background: var(--color-error);
      color: var(--color-white);
      width: 100%;
      text-align: center;
    }

    .product-info {
      padding: var(--spacing-md);
    }

    .product-collection {
      color: var(--color-yellow);
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: var(--spacing-xs);
    }

    .product-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: var(--spacing-xs);
      line-height: 1.3;
    }

    .product-brand {
      color: var(--color-gray-light);
      font-size: 12px;
      margin-bottom: var(--spacing-xs);
    }

    .product-tags {
      display: flex;
      gap: var(--spacing-xs);
      margin-bottom: var(--spacing-sm);
      flex-wrap: wrap;
    }

    .product-tag {
      border: 1px solid var(--color-yellow);
      color: var(--color-white);
      font-size: 11px;
      padding: var(--spacing-xs) var(--spacing-sm);
    }

    .product-price {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: var(--spacing-md);
    }

    .product-actions {
      display: flex;
      gap: var(--spacing-sm);
    }

    .btn-add-cart {
      flex: 1;
      background: var(--color-yellow);
      color: var(--color-black);
      padding: var(--spacing-md);
      text-align: center;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      border: none;
      font-family: 'Inter', sans-serif;
    }

    .btn-add-cart:hover:not(:disabled) {
      background: #e6d000;
    }

    .btn-add-cart:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .products-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Drawer */
    .drawer-overlay {
      display: none;
      position: fixed;
      right: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 300;
    }

    .drawer-overlay.active {
      display: block;
    }

    .drawer {
      position: fixed;
      right: 0;
      top: 0;
      width: 400px;
      height: 100%;
      background: var(--color-black);
      border-left: 2px solid var(--color-yellow);
      padding: var(--spacing-lg);
      overflow-y: auto;
      z-index: 301;
      transform: translateX(100%);
      transition: transform 0.3s;
    }

    .drawer.active {
      transform: translateX(0);
    }

    @media (max-width: 768px) {
      .drawer {
        width: 100%;
      }
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-lg);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
    }

    .drawer-close {
      background: none;
      border: none;
      color: var(--color-white);
      cursor: pointer;
      font-size: 24px;
    }

    .cart-items {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
    }

    .cart-item {
      display: grid;
      grid-template-columns: 60px 1fr;
      gap: var(--spacing-md);
      padding-bottom: var(--spacing-md);
      border-bottom: 1px solid var(--color-gray);
    }

    .cart-item-image {
      width: 60px;
      height: 60px;
      object-fit: cover;
      background: var(--color-gray);
    }

    .cart-item-details {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xs);
    }

    .cart-item-name {
      font-weight: 600;
      font-size: 14px;
    }

    .cart-item-price {
      color: var(--color-gray-light);
      font-size: 13px;
    }

    .cart-item-controls {
      display: flex;
      gap: var(--spacing-sm);
      align-items: center;
    }

    .cart-qty-btn {
      background: var(--color-gray);
      border: 1px solid var(--color-gray);
      color: var(--color-white);
      width: 24px;
      height: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: all 0.3s;
    }

    .cart-qty-btn:hover {
      background: var(--color-yellow);
      color: var(--color-black);
    }

    .cart-qty {
      font-size: 13px;
      min-width: 20px;
      text-align: center;
    }

    .btn-remove {
      background: none;
      border: none;
      color: var(--color-error);
      cursor: pointer;
      font-size: 12px;
      text-decoration: underline;
    }

    .cart-summary {
      border-top: 2px solid var(--color-yellow);
      padding-top: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: var(--spacing-md);
    }

    .btn-checkout {
      width: 100%;
      background: var(--color-success);
      color: var(--color-white);
      padding: var(--spacing-md);
      text-align: center;
      cursor: pointer;
      font-weight: 600;
      border: none;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }

    .btn-checkout:hover {
      opacity: 0.9;
    }

    .cart-empty {
      text-align: center;
      padding: var(--spacing-xl);
      color: var(--color-gray-light);
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 400;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--color-black);
      border: 1px solid var(--color-yellow);
      padding: var(--spacing-xl);
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: var(--spacing-md);
      right: var(--spacing-md);
      background: none;
      border: none;
      color: var(--color-white);
      cursor: pointer;
      font-size: 24px;
    }

    .modal-header {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: var(--spacing-lg);
      padding-right: var(--spacing-lg);
    }

    .modal-body {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .form-label {
      font-weight: 600;
      font-size: 14px;
    }

    .form-input, .form-textarea {
      background: var(--color-gray);
      border: 1px solid var(--color-gray);
      color: var(--color-white);
      padding: var(--spacing-md);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: all 0.3s;
    }

    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--color-yellow);
      background: #252525;
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-radio-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .form-radio {
      display: flex;
      gap: var(--spacing-md);
      align-items: center;
    }

    .form-radio input[type="radio"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--color-yellow);
    }

    .form-radio label {
      cursor: pointer;
      flex: 1;
    }

    .checkout-summary {
      border: 1px solid var(--color-gray);
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
      background: #151515;
    }

    .checkout-item {
      display: flex;
      justify-content: space-between;
      padding: var(--spacing-sm) 0;
      font-size: 14px;
    }

    .checkout-item-name {
      flex: 1;
    }

    .checkout-item-total {
      text-align: right;
    }

    .checkout-total {
      border-top: 1px solid var(--color-gray);
      padding-top: var(--spacing-md);
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: 16px;
    }

    .modal-actions {
      display: flex;
      gap: var(--spacing-md);
      margin-top: var(--spacing-lg);
    }

    .modal-actions .btn {
      flex: 1;
    }

    .btn {
      padding: var(--spacing-md) var(--spacing-lg);
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s;
      font-weight: 600;
      border: none;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: var(--color-yellow);
      color: var(--color-black);
    }

    .btn-primary:hover {
      background: #e6d000;
    }

    .btn-secondary {
      background: transparent;
      color: var(--color-white);
      border: 2px solid var(--color-white);
    }

    .btn-secondary:hover {
      border-color: var(--color-yellow);
      color: var(--color-yellow);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: var(--spacing-lg);
      right: var(--spacing-lg);
      padding: var(--spacing-md) var(--spacing-lg);
      border-radius: 0;
      font-weight: 600;
      z-index: 500;
      animation: slideIn 0.3s ease-out;
    }

    .toast.success {
      background: var(--color-yellow);
      color: var(--color-black);
    }

    .toast.error {
      background: var(--color-error);
      color: var(--color-white);
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .modal {
        width: 95%;
        padding: var(--spacing-lg);
      }

      .toast {
        left: var(--spacing-lg);
        right: var(--spacing-lg);
      }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav>
    <div class="navbar-container">
      <div class="navbar-logo" onclick="window.location.href='index.html'">Yukly Store</div>
      <div class="navbar-right">
        <div class="cart-icon" id="cart-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <div class="cart-badge" id="cart-badge"></div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobile-menu">
    <div class="mobile-menu-header" id="mobile-menu-header">
      <svg class="mobile-menu-arrow" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </div>
    <div class="mobile-menu-content">
      <ul id="mobile-menu-links"></ul>
    </div>
  </div>

  <!-- Breadcrumb -->
  <div class="breadcrumb" id="breadcrumb"></div>

  <!-- Collection Hero -->
  <div class="collection-hero" id="collection-hero">
    <img id="hero-image" src="" alt="">
    <div class="collection-hero-overlay"></div>
    <div class="collection-hero-content">
      <h1 id="hero-title"></h1>
      <p id="hero-description"></p>
    </div>
  </div>

  <!-- Products Section -->
  <section class="section">
    <div class="products-grid" id="products-grid"></div>
  </section>

  <!-- Cart Drawer -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="drawer" id="cart-drawer">
    <div class="drawer-header">
      Carrito
      <button class="drawer-close" id="drawer-close">×</button>
    </div>
    <div id="cart-content">
      <div class="cart-empty">Tu carrito está vacío</div>
    </div>
  </div>

  <!-- Checkout Modal -->
  <div class="modal-overlay" id="checkout-modal">
    <div class="modal">
      <button class="modal-close" id="modal-close">×</button>
      <div class="modal-header">Finalizar Pedido</div>
      <div class="modal-body">
        <div class="checkout-summary" id="checkout-summary"></div>

        <div class="form-group">
          <label class="form-label">Nombre completo *</label>
          <input type="text" class="form-input" id="checkout-name" placeholder="Tu nombre completo">
        </div>

        <div class="form-group">
          <label class="form-label">Teléfono *</label>
          <input type="tel" class="form-input" id="checkout-phone" placeholder="Tu teléfono">
        </div>

        <div class="form-group">
          <label class="form-label">Tipo de Entrega</label>
          <div class="form-radio-group">
            <div class="form-radio">
              <input type="radio" id="delivery-store" name="delivery" value="store" checked>
              <label for="delivery-store">Recoger en tienda</label>
            </div>
            <div class="form-radio">
              <input type="radio" id="delivery-point" name="delivery" value="point">
              <label for="delivery-point">Punto de entrega acordado</label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Nota adicional</label>
          <textarea class="form-textarea" id="checkout-note" placeholder="Algún comentario especial..."></textarea>
        </div>

        <div class="modal-actions">
          <button class="btn btn-secondary" id="btn-cancel-checkout">Cancelar</button>
          <button class="btn btn-primary" id="btn-send-whatsapp">Enviar pedido</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    const firebaseConfig = {
      apiKey: "AIzaSyDBIV8aKIk0aGxqDV8zlpPv9t0wirW83rw",
      authDomain: "yuklystore.firebaseapp.com",
      databaseURL: "https://yuklystore-default-rtdb.firebaseio.com",
      projectId: "yuklystore",
      storageBucket: "yuklystore.firebasestorage.app",
      messagingSenderId: "64711905871",
      appId: "1:64711905871:web:eee5c3717cf7e95d3c903a",
      measurementId: "G-FNK0G8ECJ2"
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      getDoc,
      doc,
      query,
      where,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let cart = [];
    let currentCollection = null;
    let allCollections = [];
    let allProducts = [];

    const urlParams = new URLSearchParams(window.location.search);
    const collectionId = urlParams.get("id");

    function loadCart() {
      const saved = localStorage.getItem("yukly-cart");
      cart = saved ? JSON.parse(saved) : [];
      updateCartUI();
    }

    function saveCart() {
      localStorage.setItem("yukly-cart", JSON.stringify(cart));
    }

    function showToast(message, type = "success") {
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function loadCollectionData() {
      const unsubscribe = onSnapshot(
        doc(db, "collections", collectionId),
        (docSnap) => {
          if (docSnap.exists()) {
            currentCollection = { id: docSnap.id, ...docSnap.data() };
            renderHero();
            renderBreadcrumb();
          }
        }
      );
    }

    async function loadCollections() {
      onSnapshot(collection(db, "collections"), (snapshot) => {
        allCollections = snapshot.docs.map(doc => ({
          id: doc.id,
          ...doc.data()
        }));
        renderMobileMenu();
      });
    }

    async function loadProducts() {
      onSnapshot(
        query(collection(db, "products"), where("collectionId", "==", collectionId)),
        (snapshot) => {
          allProducts = snapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
          }));
          renderProducts();
        }
      );
    }

    function renderHero() {
      if (!currentCollection) return;
      document.getElementById("hero-image").src = currentCollection.image || "data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22%3E%3Crect width=%22100%25%22 height=%22100%25%22 fill=%22%231a1a1a%22/%3E%3C/svg%3E";
      document.getElementById("hero-title").textContent = currentCollection.name;
      document.getElementById("hero-description").textContent = currentCollection.description || "";
    }

    function renderBreadcrumb() {
      document.getElementById("breadcrumb").innerHTML = `
        <a href="index.html">Inicio</a> → ${currentCollection?.name || "Colección"}
      `;
    }

    function renderMobileMenu() {
      const html = `
        <li><a href="index.html" onclick="closeMenu()">Inicio</a></li>
        ${allCollections.map(col => `
          <li><a href="collection.html?id=${col.id}" class="${col.id === collectionId ? 'active' : ''}" onclick="closeMenu()">${col.name}</a></li>
        `).join("")}
      `;
      document.getElementById("mobile-menu-links").innerHTML = html;
    }

    function renderProducts() {
      const grid = document.getElementById("products-grid");
      grid.innerHTML = allProducts.map(product => {
        const isSoldOut = product.stock === 0;
        const isLowStock = product.stock > 0 && product.stock <= 5;
        return `
          <div class="product-card" onclick="navigateToProduct('${product.id}')">
            <img src="${product.images?.[0] || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22%3E%3Crect width=%22100%25%22 height=%22100%25%22 fill=%22%231a1a1a%22/%3E%3C/svg%3E'}" alt="${product.name}" class="product-image">
            ${isLowStock ? `<div class="product-badge">Últimas ${product.stock}</div>` : ""}
            ${isSoldOut ? '<div class="product-badge sold-out">Agotado</div>' : ""}
            <div class="product-info">
              <div class="product-collection">${currentCollection?.name || ""}</div>
              <div class="product-name">${product.name}</div>
              <div class="product-brand">${product.brand || ""}</div>
              <div class="product-tags">
                ${(product.tags || []).slice(0, 3).map(tag => `<div class="product-tag">${tag}</div>`).join("")}
              </div>
              <div class="product-price">$${product.price}</div>
              <div class="product-actions">
                <button class="btn-add-cart" onclick="event.stopPropagation(); addToCart('${product.id}', '${product.name}', ${product.price}, '${product.images?.[0] || ''}')" ${isSoldOut ? 'disabled' : ''}>+</button>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    window.navigateToProduct = function(id) {
      window.location.href = `product.html?id=${id}`;
    };

    window.addToCart = function(productId, name, price, image) {
      const existing = cart.find(item => item.id === productId);
      if (existing) {
        existing.quantity++;
      } else {
        cart.push({ id: productId, name, price, image, quantity: 1 });
      }
      updateCartUI();
      showToast("Producto agregado al carrito");
    };

    function openCart() {
      document.getElementById("drawer-overlay").classList.add("active");
      document.getElementById("cart-drawer").classList.add("active");
    }

    function closeCart() {
      document.getElementById("drawer-overlay").classList.remove("active");
      document.getElementById("cart-drawer").classList.remove("active");
    }

    window.increaseQty = function(productId) {
      const item = cart.find(item => item.id === productId);
      if (item) item.quantity++;
      updateCartUI();
    };

    window.decreaseQty = function(productId) {
      const item = cart.find(item => item.id === productId);
      if (item) {
        item.quantity--;
        if (item.quantity === 0) {
          cart = cart.filter(item => item.id !== productId);
        }
      }
      updateCartUI();
    };

    window.removeFromCart = function(productId) {
      cart = cart.filter(item => item.id !== productId);
      updateCartUI();
    };

    function updateCartUI() {
      saveCart();
      const badge = document.getElementById("cart-badge");
      const total = cart.reduce((sum, item) => sum + item.quantity, 0);

      if (total > 0) {
        badge.textContent = total;
        badge.style.display = "flex";
      } else {
        badge.style.display = "none";
      }

      const content = document.getElementById("cart-content");
      if (cart.length === 0) {
        content.innerHTML = '<div class="cart-empty">Tu carrito está vacío</div>';
        return;
      }

      let html = '<div class="cart-items">';
      let cartTotal = 0;

      cart.forEach(item => {
        const subtotal = item.price * item.quantity;
        cartTotal += subtotal;
        html += `
          <div class="cart-item">
            <img src="${item.image}" alt="${item.name}" class="cart-item-image">
            <div class="cart-item-details">
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-price">$${item.price}</div>
              <div class="cart-item-controls">
                <button class="cart-qty-btn" onclick="decreaseQty('${item.id}')">−</button>
                <span class="cart-qty">${item.quantity}</span>
                <button class="cart-qty-btn" onclick="increaseQty('${item.id}')">+</button>
                <button class="btn-remove" onclick="removeFromCart('${item.id}')">Eliminar</button>
              </div>
            </div>
          </div>
        `;
      });

      html += `
        </div>
        <div class="cart-summary">
          <div class="cart-total">
            <span>Total:</span>
            <span>$${cartTotal}</span>
          </div>
          <button class="btn-checkout" onclick="openCheckout()">Pedir por WhatsApp</button>
        </div>
      `;

      content.innerHTML = html;
    }

    window.openCheckout = function() {
      if (cart.length === 0) {
        showToast("Tu carrito está vacío", "error");
        return;
      }

      renderCheckoutSummary();
      document.getElementById("checkout-modal").classList.add("active");
    };

    function renderCheckoutSummary() {
      const summary = document.getElementById("checkout-summary");
      let html = "";
      let total = 0;

      cart.forEach(item => {
        const subtotal = item.price * item.quantity;
        total += subtotal;
        html += `
          <div class="checkout-item">
            <span class="checkout-item-name">${item.name} ×${item.quantity}</span>
            <span class="checkout-item-total">$${subtotal}</span>
          </div>
        `;
      });

      html += `
        <div class="checkout-total">
          <span>Total:</span>
          <span>$${total}</span>
        </div>
      `;

      summary.innerHTML = html;
    }

    window.sendToWhatsApp = function() {
      const name = document.getElementById("checkout-name").value;
      const phone = document.getElementById("checkout-phone").value;
      const delivery = document.querySelector('input[name="delivery"]:checked').value;
      const note = document.getElementById("checkout-note").value;

      if (!name.trim() || !phone.trim()) {
        showToast("Por favor completa todos los campos obligatorios", "error");
        return;
      }

      let message = "Nuevo pedido — Yukly Store\n\n";
      message += `Cliente: ${name}\n`;
      message += `Teléfono: ${phone}\n`;
      message += `Entrega: ${delivery === "store" ? "Recoger en tienda" : "Punto de entrega acordado"}\n\n`;
      message += "Productos:\n";

      let total = 0;
      cart.forEach(item => {
        const subtotal = item.price * item.quantity;
        total += subtotal;
        message += `• ${item.name} ×${item.quantity} — $${subtotal}\n`;
      });

      message += `\nTotal: $${total} MXN`;

      if (note.trim()) {
        message += `\n\nNota: ${note}`;
      }

      const encodedMessage = encodeURIComponent(message);
      window.open(`https://wa.me/526568596503?text=${encodedMessage}`, "_blank");

      cart = [];
      updateCartUI();
      document.getElementById("checkout-modal").classList.remove("active");
      closeCart();
      showToast("¡Pedido enviado!");
    };

    function closeMenu() {
      document.getElementById("mobile-menu").classList.remove("active");
    }

    document.getElementById("cart-icon").addEventListener("click", openCart);
    document.getElementById("drawer-overlay").addEventListener("click", closeCart);
    document.getElementById("drawer-close").addEventListener("click", closeCart);
    document.getElementById("btn-cancel-checkout").addEventListener("click", () => {
      document.getElementById("checkout-modal").classList.remove("active");
    });
    document.getElementById("modal-close").addEventListener("click", () => {
      document.getElementById("checkout-modal").classList.remove("active");
    });
    document.getElementById("btn-send-whatsapp").addEventListener("click", sendToWhatsApp);
    document.getElementById("mobile-menu-header").addEventListener("click", () => {
      const menu = document.getElementById("mobile-menu");
      menu.classList.toggle("active");
    });

    loadCart();
    loadCollectionData();
    loadCollections();
    loadProducts();
  </script>
</body>
</html>
