<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto - Yukly Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-black: #0a0a0a;
      --color-white: #ffffff;
      --color-yellow: #FFE600;
      --color-gray: #1a1a1a;
      --color-gray-light: #a0a0a0;
      --color-success: #25d366;
      --color-error: #ff4444;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
      --spacing-2xl: 48px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--color-black);
      color: var(--color-white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Navbar */
    nav {
      position: sticky;
      top: 0;
      background: var(--color-black);
      border-bottom: 1px solid var(--color-gray);
      z-index: 100;
      padding: var(--spacing-md);
    }

    .navbar-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-xl);
    }

    .navbar-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 20px;
      cursor: pointer;
      white-space: nowrap;
    }

    .navbar-right {
      display: flex;
      gap: var(--spacing-lg);
      align-items: center;
    }

    .cart-icon {
      cursor: pointer;
      position: relative;
      font-size: 20px;
    }

    .cart-badge {
      position: absolute;
      top: -8px;
      right: -12px;
      background: var(--color-yellow);
      color: var(--color-black);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }

    .hamburger {
      background: none;
      border: none;
      padding: 0;
      transition: all 0.3s;
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 4px;
    }

    .hamburger span {
      width: 24px;
      height: 2px;
      background: var(--color-white);
      transition: all 0.3s;
    }

    .hamburger.active span:nth-child(1) {
      transform: rotate(45deg) translateY(10px);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active span:nth-child(3) {
      transform: rotate(-45deg) translateY(-10px);
    }

    @media (max-width: 768px) {
      .hamburger {
        display: flex;
      }

      .navbar-container {
        gap: var(--spacing-md);
      }

      .navbar-right {
        gap: var(--spacing-md);
      }
    }

    .mobile-menu {
      position: fixed;
      left: 0;
      top: 60px;
      width: 100%;
      background: var(--color-black);
      border-top: 3px solid var(--color-yellow);
      box-shadow: 0 2px 20px rgba(255, 230, 0, 0.1);
      z-index: 150;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .mobile-menu.active {
      max-height: 500px;
    }

    .mobile-menu-header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-md);
      border-bottom: 1px solid var(--color-gray);
    }

    .mobile-menu-arrow {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-yellow);
      font-size: 20px;
      transition: transform 0.3s;
    }

    .mobile-menu.active .mobile-menu-arrow {
      transform: rotate(180deg);
    }

    .mobile-menu-content {
      padding: var(--spacing-lg);
      overflow-y: auto;
      max-height: 400px;
    }

    .mobile-menu-content ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .mobile-menu-content li {
      animation: slideInLeft 0.3s ease forwards;
    }

    .mobile-menu-content li:nth-child(1) { animation-delay: 0.05s; }
    .mobile-menu-content li:nth-child(2) { animation-delay: 0.1s; }
    .mobile-menu-content li:nth-child(3) { animation-delay: 0.15s; }
    .mobile-menu-content li:nth-child(4) { animation-delay: 0.2s; }
    .mobile-menu-content li:nth-child(5) { animation-delay: 0.25s; }
    .mobile-menu-content li:nth-child(6) { animation-delay: 0.3s; }
    .mobile-menu-content li:nth-child(7) { animation-delay: 0.35s; }
    .mobile-menu-content li:nth-child(8) { animation-delay: 0.4s; }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .mobile-menu-content a {
      color: var(--color-white);
      text-decoration: none;
      cursor: pointer;
      display: block;
      padding: var(--spacing-md) 0;
      font-size: 16px;
      transition: all 0.3s;
      border-left: 3px solid transparent;
      padding-left: var(--spacing-md);
    }

    .mobile-menu-content a:hover {
      color: var(--color-yellow);
      border-left-color: var(--color-yellow);
    }

    .mobile-menu-content a.active {
      color: var(--color-yellow);
      border-left-color: var(--color-yellow);
      font-weight: 600;
    }

    /* Container */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: var(--spacing-2xl) var(--spacing-lg);
    }

    /* Breadcrumb */
    .breadcrumb {
      font-size: 14px;
      color: var(--color-gray-light);
      margin-bottom: var(--spacing-xl);
    }

    .breadcrumb a {
      color: var(--color-white);
      text-decoration: none;
      cursor: pointer;
    }

    .breadcrumb a:hover {
      color: var(--color-yellow);
    }

    /* Product Layout */
    .product-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-2xl);
      align-items: start;
    }

    @media (max-width: 768px) {
      .product-layout {
        grid-template-columns: 1fr;
        gap: var(--spacing-lg);
      }
    }

    /* Gallery */
    .gallery {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .gallery-main {
      width: 100%;
      aspect-ratio: 1;
      background: var(--color-gray);
      overflow: hidden;
    }

    .gallery-main img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .gallery-thumbnails {
      display: flex;
      gap: var(--spacing-md);
      overflow-x: auto;
    }

    .thumbnail {
      width: 80px;
      height: 80px;
      background: var(--color-gray);
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.3s;
      flex-shrink: 0;
    }

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumbnail.active {
      border-color: var(--color-yellow);
    }

    /* Product Info */
    .product-info {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-lg);
    }

    .product-collection {
      color: var(--color-yellow);
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .product-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 36px;
      font-weight: 700;
      line-height: 1.2;
    }

    .product-brand {
      color: var(--color-gray-light);
      font-size: 14px;
    }

    .product-price {
      font-size: 32px;
      font-weight: 700;
    }

    .product-stock {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-md);
      background: var(--color-gray);
    }

    .stock-badge {
      padding: var(--spacing-sm) var(--spacing-md);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .stock-badge.in-stock {
      background: var(--color-success);
      color: var(--color-white);
    }

    .stock-badge.low-stock {
      background: var(--color-yellow);
      color: var(--color-black);
    }

    .stock-badge.sold-out {
      background: var(--color-error);
      color: var(--color-white);
    }

    .product-tags {
      display: flex;
      gap: var(--spacing-xs);
      flex-wrap: wrap;
    }

    .product-tag {
      border: 1px solid var(--color-yellow);
      color: var(--color-white);
      font-size: 12px;
      padding: var(--spacing-xs) var(--spacing-sm);
    }

    .product-description {
      font-size: 15px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.9);
    }

    .product-controls {
      display: flex;
      gap: var(--spacing-md);
      align-items: center;
    }

    .quantity-control {
      display: flex;
      gap: var(--spacing-sm);
      align-items: center;
      background: var(--color-gray);
      padding: var(--spacing-sm);
    }

    .quantity-btn {
      background: none;
      border: none;
      color: var(--color-white);
      cursor: pointer;
      font-size: 18px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .quantity-btn:hover:not(:disabled) {
      background: var(--color-yellow);
      color: var(--color-black);
    }

    .quantity-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .quantity-input {
      width: 50px;
      text-align: center;
      background: none;
      border: none;
      color: var(--color-white);
      font-size: 16px;
      font-weight: 600;
    }

    .quantity-input:focus {
      outline: none;
    }

    .btn {
      padding: var(--spacing-md) var(--spacing-lg);
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s;
      font-weight: 600;
      border: none;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: var(--color-yellow);
      color: var(--color-black);
      flex: 1;
    }

    .btn-primary:hover:not(:disabled) {
      background: #e6d000;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Related Products */
    .related-section {
      margin-top: var(--spacing-2xl);
      padding-top: var(--spacing-2xl);
      border-top: 1px solid var(--color-gray);
    }

    .related-section h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: var(--spacing-xl);
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: var(--spacing-lg);
    }

    .product-card {
      background: var(--color-gray);
      cursor: pointer;
      transition: transform 0.3s;
      position: relative;
    }

    .product-card:hover {
      transform: translateY(-4px);
    }

    .product-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .product-card-info {
      padding: var(--spacing-md);
    }

    .product-card-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: var(--spacing-xs);
      line-height: 1.3;
    }

    .product-card-price {
      font-size: 16px;
      font-weight: 700;
    }

    /* Drawer */
    .drawer-overlay {
      display: none;
      position: fixed;
      right: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 300;
    }

    .drawer-overlay.active {
      display: block;
    }

    .drawer {
      position: fixed;
      right: 0;
      top: 0;
      width: 400px;
      height: 100%;
      background: var(--color-black);
      border-left: 2px solid var(--color-yellow);
      padding: var(--spacing-lg);
      overflow-y: auto;
      z-index: 301;
      transform: translateX(100%);
      transition: transform 0.3s;
    }

    .drawer.active {
      transform: translateX(0);
    }

    @media (max-width: 768px) {
      .drawer {
        width: 100%;
      }
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-lg);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
    }

    .drawer-close {
      background: none;
      border: none;
      color: var(--color-white);
      cursor: pointer;
      font-size: 24px;
    }

    .cart-items {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
    }

    .cart-item {
      display: grid;
      grid-template-columns: 60px 1fr;
      gap: var(--spacing-md);
      padding-bottom: var(--spacing-md);
      border-bottom: 1px solid var(--color-gray);
    }

    .cart-item-image {
      width: 60px;
      height: 60px;
      object-fit: cover;
      background: var(--color-gray);
    }

    .cart-item-details {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xs);
    }

    .cart-item-name {
      font-weight: 600;
      font-size: 14px;
    }

    .cart-item-price {
      color: var(--color-gray-light);
      font-size: 13px;
    }

    .cart-item-controls {
      display: flex;
      gap: var(--spacing-sm);
      align-items: center;
    }

    .cart-qty-btn {
      background: var(--color-gray);
      border: 1px solid var(--color-gray);
      color: var(--color-white);
      width: 24px;
      height: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: all 0.3s;
    }

    .cart-qty-btn:hover {
      background: var(--color-yellow);
      color: var(--color-black);
    }

    .cart-qty {
      font-size: 13px;
      min-width: 20px;
      text-align: center;
    }

    .btn-remove {
      background: none;
      border: none;
      color: var(--color-error);
      cursor: pointer;
      font-size: 12px;
      text-decoration: underline;
    }

    .cart-summary {
      border-top: 2px solid var(--color-yellow);
      padding-top: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: var(--spacing-md);
    }

    .btn-checkout {
      width: 100%;
      background: var(--color-success);
      color: var(--color-white);
      padding: var(--spacing-md);
      text-align: center;
      cursor: pointer;
      font-weight: 600;
      border: none;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }

    .btn-checkout:hover {
      opacity: 0.9;
    }

    .cart-empty {
      text-align: center;
      padding: var(--spacing-xl);
      color: var(--color-gray-light);
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 400;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--color-black);
      border: 1px solid var(--color-yellow);
      padding: var(--spacing-xl);
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: var(--spacing-md);
      right: var(--spacing-md);
      background: none;
      border: none;
      color: var(--color-white);
      cursor: pointer;
      font-size: 24px;
    }

    .modal-header {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: var(--spacing-lg);
      padding-right: var(--spacing-lg);
    }

    .modal-body {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .form-label {
      font-weight: 600;
      font-size: 14px;
    }

    .form-input, .form-textarea {
      background: var(--color-gray);
      border: 1px solid var(--color-gray);
      color: var(--color-white);
      padding: var(--spacing-md);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: all 0.3s;
    }

    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--color-yellow);
      background: #252525;
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-radio-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .form-radio {
      display: flex;
      gap: var(--spacing-md);
      align-items: center;
    }

    .form-radio input[type="radio"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--color-yellow);
    }

    .form-radio label {
      cursor: pointer;
      flex: 1;
    }

    .checkout-summary {
      border: 1px solid var(--color-gray);
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
      background: #151515;
    }

    .checkout-item {
      display: flex;
      justify-content: space-between;
      padding: var(--spacing-sm) 0;
      font-size: 14px;
    }

    .checkout-item-name {
      flex: 1;
    }

    .checkout-item-total {
      text-align: right;
    }

    .checkout-total {
      border-top: 1px solid var(--color-gray);
      padding-top: var(--spacing-md);
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: 16px;
    }

    .modal-actions {
      display: flex;
      gap: var(--spacing-md);
      margin-top: var(--spacing-lg);
    }

    .modal-actions .btn {
      flex: 1;
    }

    .btn-secondary {
      background: transparent;
      color: var(--color-white);
      border: 2px solid var(--color-white);
    }

    .btn-secondary:hover {
      border-color: var(--color-yellow);
      color: var(--color-yellow);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: var(--spacing-lg);
      right: var(--spacing-lg);
      padding: var(--spacing-md) var(--spacing-lg);
      border-radius: 0;
      font-weight: 600;
      z-index: 500;
      animation: slideIn 0.3s ease-out;
    }

    .toast.success {
      background: var(--color-yellow);
      color: var(--color-black);
    }

    .toast.error {
      background: var(--color-error);
      color: var(--color-white);
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: var(--spacing-lg);
      }

      .product-name {
        font-size: 24px;
      }

      .product-price {
        font-size: 24px;
      }

      .products-grid {
        grid-template-columns: 1fr;
      }

      .modal {
        width: 95%;
        padding: var(--spacing-lg);
      }

      .toast {
        left: var(--spacing-lg);
        right: var(--spacing-lg);
      }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav>
    <div class="navbar-container">
      <div class="navbar-logo" onclick="window.location.href='index.html'">Yukly Store</div>
      <div class="navbar-right">
        <div class="cart-icon" id="cart-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <div class="cart-badge" id="cart-badge"></div>
        </div>
        <div class="hamburger" id="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobile-menu">
    <div class="mobile-menu-content">
      <ul id="mobile-menu-links"></ul>
    </div>
  </div>

  <!-- Container -->
  <div class="container">
    <!-- Breadcrumb -->
    <div class="breadcrumb" id="breadcrumb"></div>

    <!-- Product Layout -->
    <div class="product-layout">
      <!-- Gallery -->
      <div class="gallery">
        <div class="gallery-main">
          <img id="gallery-main" src="" alt="">
        </div>
        <div class="gallery-thumbnails" id="gallery-thumbnails"></div>
      </div>

      <!-- Product Info -->
      <div class="product-info">
        <div class="product-collection" id="product-collection"></div>
        <h1 class="product-name" id="product-name"></h1>
        <div class="product-brand" id="product-brand"></div>
        <div class="product-price" id="product-price"></div>
        <div class="product-stock" id="product-stock"></div>
        <div class="product-tags" id="product-tags"></div>
        <p class="product-description" id="product-description"></p>

        <div class="product-controls">
          <div class="quantity-control">
            <button class="quantity-btn" id="qty-minus" onclick="decreaseQty()">−</button>
            <input type="number" class="quantity-input" id="qty-input" value="1" min="1">
            <button class="quantity-btn" id="qty-plus" onclick="increaseQty()">+</button>
          </div>
          <button class="btn btn-primary" id="btn-add-cart">Agregar al carrito</button>
        </div>
      </div>
    </div>

    <!-- Related Products -->
    <div class="related-section" id="related-section" style="display: none;">
      <h2>Productos Relacionados</h2>
      <div class="products-grid" id="related-grid"></div>
    </div>
  </div>

  <!-- Cart Drawer -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="drawer" id="cart-drawer">
    <div class="drawer-header">
      Carrito
      <button class="drawer-close" id="drawer-close">×</button>
    </div>
    <div id="cart-content">
      <div class="cart-empty">Tu carrito está vacío</div>
    </div>
  </div>

  <!-- Checkout Modal -->
  <div class="modal-overlay" id="checkout-modal">
    <div class="modal">
      <button class="modal-close" id="modal-close">×</button>
      <div class="modal-header">Finalizar Pedido</div>
      <div class="modal-body">
        <div class="checkout-summary" id="checkout-summary"></div>

        <div class="form-group">
          <label class="form-label">Nombre completo *</label>
          <input type="text" class="form-input" id="checkout-name" placeholder="Tu nombre completo">
        </div>

        <div class="form-group">
          <label class="form-label">Teléfono *</label>
          <input type="tel" class="form-input" id="checkout-phone" placeholder="Tu teléfono">
        </div>

        <div class="form-group">
          <label class="form-label">Tipo de Entrega</label>
          <div class="form-radio-group">
            <div class="form-radio">
              <input type="radio" id="delivery-store" name="delivery" value="store" checked>
              <label for="delivery-store">Recoger en tienda</label>
            </div>
            <div class="form-radio">
              <input type="radio" id="delivery-point" name="delivery" value="point">
              <label for="delivery-point">Punto de entrega acordado</label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Nota adicional</label>
          <textarea class="form-textarea" id="checkout-note" placeholder="Algún comentario especial..."></textarea>
        </div>

        <div class="modal-actions">
          <button class="btn btn-secondary" id="btn-cancel-checkout">Cancelar</button>
          <button class="btn btn-primary" id="btn-send-whatsapp">Enviar pedido</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_AUTH_DOMAIN",
      projectId: "TU_PROJECT_ID",
      storageBucket: "TU_STORAGE_BUCKET",
      messagingSenderId: "TU_MESSAGING_SENDER_ID",
      appId: "TU_APP_ID"
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      getDoc,
      doc,
      query,
      where,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let cart = [];
    let currentProduct = null;
    let currentCollection = null;
    let allProducts = [];
    let allCollections = [];
    let quantity = 1;
    let currentImageIndex = 0;

    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get("id");

    function loadCart() {
      const saved = localStorage.getItem("yukly-cart");
      cart = saved ? JSON.parse(saved) : [];
      updateCartUI();
    }

    function saveCart() {
      localStorage.setItem("yukly-cart", JSON.stringify(cart));
    }

    function showToast(message, type = "success") {
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function loadProductData() {
      const unsubscribe = onSnapshot(
        doc(db, "products", productId),
        (docSnap) => {
          if (docSnap.exists()) {
            currentProduct = { id: docSnap.id, ...docSnap.data() };
            loadCollectionData();
            renderProduct();
            loadRelatedProducts();
          }
        }
      );
    }

    async function loadCollectionData() {
      if (!currentProduct) return;
      const unsubscribe = onSnapshot(
        doc(db, "collections", currentProduct.collectionId),
        (docSnap) => {
          if (docSnap.exists()) {
            currentCollection = { id: docSnap.id, ...docSnap.data() };
            renderBreadcrumb();
          }
        }
      );
    }

    async function loadCollections() {
      onSnapshot(collection(db, "collections"), (snapshot) => {
        allCollections = snapshot.docs.map(doc => ({
          id: doc.id,
          ...doc.data()
        }));
        renderMobileMenu();
      });
    }

    async function loadAllProducts() {
      onSnapshot(collection(db, "products"), (snapshot) => {
        allProducts = snapshot.docs.map(doc => ({
          id: doc.id,
          ...doc.data()
        }));
      });
    }

    function renderProduct() {
      if (!currentProduct) return;

      document.getElementById("product-name").textContent = currentProduct.name;
      document.getElementById("product-brand").textContent = currentProduct.brand || "";
      document.getElementById("product-price").textContent = `$${currentProduct.price}`;
      document.getElementById("product-description").textContent = currentProduct.description || "";

      const stockEl = document.getElementById("product-stock");
      if (currentProduct.stock === 0) {
        stockEl.innerHTML = '<div class="stock-badge sold-out">Agotado</div>';
        document.getElementById("btn-add-cart").disabled = true;
        document.getElementById("qty-plus").disabled = true;
        document.getElementById("qty-input").disabled = true;
      } else if (currentProduct.stock > 0 && currentProduct.stock <= 5) {
        stockEl.innerHTML = `<div class="stock-badge low-stock">Últimas ${currentProduct.stock} unidades</div>`;
      } else {
        stockEl.innerHTML = '<div class="stock-badge in-stock">En stock</div>';
      }

      document.getElementById("qty-input").max = currentProduct.stock || 1;

      const tagsEl = document.getElementById("product-tags");
      tagsEl.innerHTML = (currentProduct.tags || []).map(tag =>
        `<div class="product-tag">${tag}</div>`
      ).join("");

      renderGallery();
    }

    function renderBreadcrumb() {
      const html = `
        <a href="index.html">Inicio</a> →
        <a href="collection.html?id=${currentCollection?.id}">${currentCollection?.name || "Colección"}</a> →
        ${currentProduct?.name || "Producto"}
      `;
      document.getElementById("breadcrumb").innerHTML = html;
      document.getElementById("product-collection").textContent = currentCollection?.name || "";
    }

    function renderGallery() {
      const main = document.getElementById("gallery-main");
      main.src = currentProduct.images?.[0] || "data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22%3E%3Crect width=%22100%25%22 height=%22100%25%22 fill=%22%231a1a1a%22/%3E%3C/svg%3E";

      const thumbnails = document.getElementById("gallery-thumbnails");
      if (currentProduct.images && currentProduct.images.length > 1) {
        thumbnails.innerHTML = currentProduct.images.map((img, i) => `
          <div class="thumbnail ${i === 0 ? 'active' : ''}" onclick="changeImage(${i})">
            <img src="${img}" alt="Image ${i}">
          </div>
        `).join("");
      } else {
        thumbnails.innerHTML = "";
      }
    }

    window.changeImage = function(index) {
      currentImageIndex = index;
      document.getElementById("gallery-main").src = currentProduct.images[index];
      document.querySelectorAll(".thumbnail").forEach((t, i) => {
        t.classList.toggle("active", i === index);
      });
    };

    function renderMobileMenu() {
      const currentProductCollectionId = currentProduct?.collectionId;
      const html = `
        <li><a href="index.html" onclick="closeMenu()">Inicio</a></li>
        ${allCollections.map(col => `
          <li><a href="collection.html?id=${col.id}" class="${col.id === currentProductCollectionId ? 'active' : ''}" onclick="closeMenu()">${col.name}</a></li>
        `).join("")}
      `;
      document.getElementById("mobile-menu-links").innerHTML = html;
    }

    async function loadRelatedProducts() {
      if (!currentProduct) return;

      const sameCollection = allProducts.filter(p =>
        p.collectionId === currentProduct.collectionId && p.id !== productId
      );

      let related = sameCollection.slice(0, 4);

      if (related.length < 4) {
        const sameTags = allProducts.filter(p =>
          p.id !== productId &&
          !related.some(r => r.id === p.id) &&
          p.tags && currentProduct.tags &&
          p.tags.some(tag => currentProduct.tags.includes(tag))
        );
        related = related.concat(sameTags.slice(0, 4 - related.length));
      }

      if (related.length > 0) {
        document.getElementById("related-section").style.display = "block";
        renderRelatedGrid(related);
      }
    }

    function renderRelatedGrid(products) {
      const grid = document.getElementById("related-grid");
      grid.innerHTML = products.map(p => {
        const isSoldOut = p.stock === 0;
        return `
          <div class="product-card" onclick="window.location.href='product.html?id=${p.id}'">
            <img src="${p.images?.[0] || 'data:image/svg+xml'}" alt="${p.name}">
            <div class="product-card-info">
              <div class="product-card-name">${p.name}</div>
              <div class="product-card-price">$${p.price}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    window.increaseQty = function() {
      if (quantity < (currentProduct.stock || 1)) {
        quantity++;
        document.getElementById("qty-input").value = quantity;
      }
    };

    window.decreaseQty = function() {
      if (quantity > 1) {
        quantity--;
        document.getElementById("qty-input").value = quantity;
      }
    };

    document.getElementById("qty-input").addEventListener("change", (e) => {
      let val = parseInt(e.target.value) || 1;
      val = Math.max(1, Math.min(val, currentProduct.stock || 1));
      quantity = val;
      e.target.value = val;
    });

    document.getElementById("btn-add-cart").addEventListener("click", () => {
      if (!currentProduct) return;

      const existing = cart.find(item => item.id === productId);
      if (existing) {
        existing.quantity += quantity;
      } else {
        cart.push({
          id: productId,
          name: currentProduct.name,
          price: currentProduct.price,
          image: currentProduct.images?.[0] || "",
          quantity
        });
      }

      saveCart();
      updateCartUI();
      showToast("Producto agregado al carrito");
      quantity = 1;
      document.getElementById("qty-input").value = 1;
    });

    function openCart() {
      document.getElementById("drawer-overlay").classList.add("active");
      document.getElementById("cart-drawer").classList.add("active");
    }

    function closeCart() {
      document.getElementById("drawer-overlay").classList.remove("active");
      document.getElementById("cart-drawer").classList.remove("active");
    }

    window.increaseQtyCart = function(productId) {
      const item = cart.find(item => item.id === productId);
      if (item) item.quantity++;
      updateCartUI();
    };

    window.decreaseQtyCart = function(productId) {
      const item = cart.find(item => item.id === productId);
      if (item) {
        item.quantity--;
        if (item.quantity === 0) {
          cart = cart.filter(item => item.id !== productId);
        }
      }
      updateCartUI();
    };

    window.removeFromCart = function(productId) {
      cart = cart.filter(item => item.id !== productId);
      updateCartUI();
    };

    function updateCartUI() {
      saveCart();
      const badge = document.getElementById("cart-badge");
      const total = cart.reduce((sum, item) => sum + item.quantity, 0);

      if (total > 0) {
        badge.textContent = total;
        badge.style.display = "flex";
      } else {
        badge.style.display = "none";
      }

      const content = document.getElementById("cart-content");
      if (cart.length === 0) {
        content.innerHTML = '<div class="cart-empty">Tu carrito está vacío</div>';
        return;
      }

      let html = '<div class="cart-items">';
      let cartTotal = 0;

      cart.forEach(item => {
        const subtotal = item.price * item.quantity;
        cartTotal += subtotal;
        html += `
          <div class="cart-item">
            <img src="${item.image}" alt="${item.name}" class="cart-item-image">
            <div class="cart-item-details">
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-price">$${item.price}</div>
              <div class="cart-item-controls">
                <button class="cart-qty-btn" onclick="decreaseQtyCart('${item.id}')">−</button>
                <span class="cart-qty">${item.quantity}</span>
                <button class="cart-qty-btn" onclick="increaseQtyCart('${item.id}')">+</button>
                <button class="btn-remove" onclick="removeFromCart('${item.id}')">Eliminar</button>
              </div>
            </div>
          </div>
        `;
      });

      html += `
        </div>
        <div class="cart-summary">
          <div class="cart-total">
            <span>Total:</span>
            <span>$${cartTotal}</span>
          </div>
          <button class="btn-checkout" onclick="openCheckout()">Pedir por WhatsApp</button>
        </div>
      `;

      content.innerHTML = html;
    }

    window.openCheckout = function() {
      if (cart.length === 0) {
        showToast("Tu carrito está vacío", "error");
        return;
      }

      renderCheckoutSummary();
      document.getElementById("checkout-modal").classList.add("active");
    };

    function renderCheckoutSummary() {
      const summary = document.getElementById("checkout-summary");
      let html = "";
      let total = 0;

      cart.forEach(item => {
        const subtotal = item.price * item.quantity;
        total += subtotal;
        html += `
          <div class="checkout-item">
            <span class="checkout-item-name">${item.name} ×${item.quantity}</span>
            <span class="checkout-item-total">$${subtotal}</span>
          </div>
        `;
      });

      html += `
        <div class="checkout-total">
          <span>Total:</span>
          <span>$${total}</span>
        </div>
      `;

      summary.innerHTML = html;
    }

    window.sendToWhatsApp = function() {
      const name = document.getElementById("checkout-name").value;
      const phone = document.getElementById("checkout-phone").value;
      const delivery = document.querySelector('input[name="delivery"]:checked').value;
      const note = document.getElementById("checkout-note").value;

      if (!name.trim() || !phone.trim()) {
        showToast("Por favor completa todos los campos obligatorios", "error");
        return;
      }

      let message = "Nuevo pedido — Yukly Store\n\n";
      message += `Cliente: ${name}\n`;
      message += `Teléfono: ${phone}\n`;
      message += `Entrega: ${delivery === "store" ? "Recoger en tienda" : "Punto de entrega acordado"}\n\n`;
      message += "Productos:\n";

      let total = 0;
      cart.forEach(item => {
        const subtotal = item.price * item.quantity;
        total += subtotal;
        message += `• ${item.name} ×${item.quantity} — $${subtotal}\n`;
      });

      message += `\nTotal: $${total} MXN`;

      if (note.trim()) {
        message += `\n\nNota: ${note}`;
      }

      const encodedMessage = encodeURIComponent(message);
      window.open(`https://wa.me/526568596503?text=${encodedMessage}`, "_blank");

      cart = [];
      updateCartUI();
      document.getElementById("checkout-modal").classList.remove("active");
      closeCart();
      showToast("¡Pedido enviado!");
    };

    function closeMenu() {
      document.getElementById("mobile-menu").classList.remove("active");
    }

    document.getElementById("cart-icon").addEventListener("click", openCart);
    document.getElementById("drawer-overlay").addEventListener("click", closeCart);
    document.getElementById("drawer-close").addEventListener("click", closeCart);
    document.getElementById("btn-cancel-checkout").addEventListener("click", () => {
      document.getElementById("checkout-modal").classList.remove("active");
    });
    document.getElementById("modal-close").addEventListener("click", () => {
      document.getElementById("checkout-modal").classList.remove("active");
    });
    document.getElementById("btn-send-whatsapp").addEventListener("click", sendToWhatsApp);
    document.getElementById("hamburger").addEventListener("click", () => {
      const menu = document.getElementById("mobile-menu");
      const hamburger = document.getElementById("hamburger");
      menu.classList.add("active");
      hamburger.classList.add("active");
    });
    document.getElementById("mobile-menu").addEventListener("click", (e) => {
      if (e.target === document.getElementById("mobile-menu")) {
        closeMenu();
      }
    });

    loadCart();
    loadProductData();
    loadCollections();
    loadAllProducts();
  </script>
</body>
</html>
